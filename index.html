<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Deep Insight - Neural Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent-soft: #818cf8;
            --text-main: #e2e8f0;
        }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-main); color: var(--text-main); }
        
        .glass-panel { background: var(--bg-card); border: 1px solid #334155; border-radius: 24px; }
        
        .btn-game { 
            transition: all 0.2s ease; border-radius: 12px; font-weight: 500;
            box-shadow: 0 4px 0 #0f172a;
        }
        .btn-game:active { transform: translateY(3px); box-shadow: 0 1px 0 #0f172a; }
        
        .option-item {
            cursor: pointer; background: #334155; border: 2px solid transparent; border-radius: 16px;
            transition: all 0.2s;
        }
        .option-item:hover { background: #3d4e66; border-color: #6366f1; }
        .option-item.selected { background: #475569; border-color: #818cf8; box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }

        /* Matrix SVG Styles */
        .matrix-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #334155; padding: 15px; border-radius: 20px; }
        .matrix-box { aspect-ratio: 1; background: #f8fafc; border-radius: 10px; display: flex; justify-content: center; align-items: center; }

        .page { display: none; }
        .page.active { display: block; animation: smoothIn 0.5s ease-out; }
        @keyframes smoothIn { from { opacity: 0; } to { opacity: 1; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 flex justify-between items-center border-b border-slate-800 bg-slate-900/40 backdrop-blur-lg sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-brain text-white text-sm"></i>
            </div>
            <span class="font-bold text-lg tracking-tight">DEEP<span class="text-indigo-400">INSIGHT</span></span>
        </div>
        <div id="timer-ui" class="hidden flex items-center gap-3 bg-slate-800/80 px-5 py-2 rounded-full border border-slate-700">
            <i class="fa-regular fa-clock text-indigo-400"></i>
            <span id="timer-val" class="font-mono text-xl font-bold text-indigo-100">30:00</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        
        <section id="page-start" class="page active w-full max-w-md">
            <div class="glass-panel p-10 text-center">
                <h1 class="text-3xl font-bold mb-4">การประเมินศักยภาพ</h1>
                <p class="text-slate-400 text-sm mb-10 leading-relaxed">บททดสอบ 30 ข้อ เพื่อวัดระดับความฉลาดทางตรรกะ และวิเคราะห์คุณลักษณะนิสัยเชิงลึก</p>
                
                <div class="space-y-4 mb-10 text-left">
                    <div>
                        <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest block mb-2 ml-1">Nickname</label>
                        <input type="text" id="p-name" placeholder="ชื่อของคุณ..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>
                </div>

                <button onclick="initGame()" class="btn-game bg-indigo-600 w-full py-4 text-lg text-white shadow-indigo-900/50">
                    เริ่มการทดสอบ <i class="fa-solid fa-arrow-right-long ml-2"></i>
                </button>
            </div>
        </section>

        <section id="page-test" class="page w-full max-w-4xl">
            <div class="glass-panel p-6 md:p-12">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <div id="q-lvl" class="inline-block px-3 py-1 rounded-md text-[10px] font-bold uppercase mb-2">Level: Easy</div>
                        <h2 class="text-3xl font-black">ข้อที่ <span id="q-num" class="text-indigo-400">1</span>/30</h2>
                    </div>
                    <div class="text-right hidden md:block">
                        <div class="text-[10px] text-slate-500 font-bold uppercase mb-2">Progress</div>
                        <div class="w-48 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                            <div id="prog-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <div id="q-area" class="min-h-[350px] flex flex-col items-center justify-center">
                    </div>

                <div class="flex justify-between items-center mt-12 pt-8 border-t border-slate-800">
                    <button id="btn-prev" onclick="moveQ(-1)" class="text-slate-500 font-bold hover:text-slate-300 transition-colors opacity-0">
                        <i class="fa-solid fa-chevron-left mr-2"></i> ก่อนหน้า
                    </button>
                    <button id="btn-next" onclick="moveQ(1)" class="btn-game bg-indigo-500 px-12 py-3 text-white disabled:opacity-20" disabled>
                        ข้อถัดไป <i class="fa-solid fa-chevron-right ml-2"></i>
                    </button>
                    <button id="btn-submit" onclick="finishGame()" class="btn-game bg-emerald-600 px-10 py-3 text-white hidden">
                        ส่งคำตอบ <i class="fa-solid fa-paper-plane ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <section id="page-result" class="page w-full max-w-4xl">
            <div class="glass-panel p-8 md:p-12 overflow-hidden relative">
                <div class="text-center mb-12">
                    <div class="text-indigo-400 font-bold text-sm uppercase tracking-widest mb-2">Analysis Complete</div>
                    <h2 id="res-user" class="text-4xl font-black mb-2">PLAYER</h2>
                    <p class="text-slate-500">รายงานสรุปผลอัจฉริยภาพและบุคลิกภาพ</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <div class="bg-slate-800/40 p-8 rounded-3xl border border-slate-700 text-center">
                        <div class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">IQ Score</div>
                        <div id="res-iq" class="text-6xl font-black text-indigo-400">--</div>
                    </div>
                    <div class="bg-slate-800/40 p-8 rounded-3xl border border-slate-700 text-center">
                        <div class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Trait</div>
                        <div id="res-trait" class="text-xl font-bold text-emerald-400">--</div>
                    </div>
                    <div class="bg-slate-800/40 p-8 rounded-3xl border border-slate-700 text-center">
                        <div class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Aptitude</div>
                        <div id="res-apt" class="text-xl font-bold text-purple-400">--</div>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-8 rounded-3xl border border-slate-800 mb-10">
                    <h3 class="font-bold text-slate-300 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-quote-left text-indigo-500"></i> บทวิเคราะห์โดยละเอียด
                    </h3>
                    <p id="res-desc" class="text-slate-400 leading-relaxed italic"></p>
                </div>

                <div class="flex justify-center">
                    <button onclick="location.reload()" class="btn-game bg-slate-700 px-8 py-3 text-white text-sm">ทดสอบใหม่อีกครั้ง</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- 🖼 Visual Assets ---
        const svgAssets = {
            circle: (c="#1e293b") => `<svg width="40" height="40"><circle cx="20" cy="20" r="15" fill="${c}" /></svg>`,
            square: (c="#1e293b") => `<svg width="40" height="40"><rect x="5" y="5" width="30" height="30" fill="${c}" /></svg>`,
            tri: (c="#1e293b") => `<svg width="40" height="40"><polygon points="20,5 35,35 5,35" fill="${c}" /></svg>`,
            dot: (c="#1e293b") => `<svg width="40" height="40"><circle cx="20" cy="20" r="5" fill="${c}" /></svg>`,
            wrap: (cells) => `<div class="matrix-container">${cells}</div>`,
            box: (content) => `<div class="matrix-box">${content}</div>`,
            q: () => `<div class="matrix-box bg-indigo-100 text-indigo-600 font-black text-xl">?</div>`
        };

        // --- 📝 30 Unique Questions (7 Easy, 11 Medium, 12 Hard) ---
        const questions = [
            // EASY (7 QUESTIONS)
            { type: 'logic', lvl: 'Easy', w: 1, text: "2, 4, 6, 8, ... ตัวต่อไปคืออะไร?", opts: ["9", "10", "12", "14"], ans: 1 },
            { type: 'visual', lvl: 'Easy', w: 1, content: svgAssets.wrap(svgAssets.box(svgAssets.circle()) + svgAssets.box(svgAssets.circle()) + svgAssets.box(svgAssets.circle()) + svgAssets.box(svgAssets.square()) + svgAssets.box(svgAssets.square()) + svgAssets.box(svgAssets.square()) + svgAssets.box(svgAssets.tri()) + svgAssets.box(svgAssets.tri()) + svgAssets.q()), opts: [svgAssets.tri(), svgAssets.circle(), svgAssets.square(), svgAssets.dot()], ans: 0 },
            { type: 'logic', lvl: 'Easy', w: 1, text: "หากสลับตัวอักษร 'R-A-E-T-W' จะได้คำว่าอะไรในภาษาอังกฤษ?", opts: ["WATER", "WRITE", "TOWER", "TREAT"], ans: 0 },
            { type: 'math', lvl: 'Easy', w: 1, text: "มีแอปเปิ้ล 12 ลูก ให้เพื่อนไปครึ่งหนึ่ง แล้วซื้อเพิ่มอีก 2 ลูก ตอนนี้มีกี่ลูก?", opts: ["6", "7", "8", "9"], ans: 2 },
            { type: 'visual', lvl: 'Easy', w: 1, content: svgAssets.wrap(svgAssets.box(svgAssets.dot('#6366f1')) + svgAssets.box(svgAssets.dot('#6366f1')) + svgAssets.q() + svgAssets.box(svgAssets.dot()) + svgAssets.box(svgAssets.dot()) + svgAssets.box(svgAssets.dot()) + svgAssets.box(svgAssets.dot()) + svgAssets.box(svgAssets.dot()) + svgAssets.box(svgAssets.dot())), opts: [svgAssets.dot('#f43f5e'), svgAssets.dot('#6366f1'), svgAssets.dot('#10b981'), svgAssets.dot('#000')], ans: 1 },
            { type: 'phil', lvl: 'Easy', w: 2, text: "คุณเชื่อว่า 'ความพยายาม' สำคัญกว่า 'พรสวรรค์' หรือไม่?", opts: ["เชื่ออย่างยิ่ง (Growth Mindset)", "เชื่อบางส่วน", "พรสวรรค์สำคัญกว่า", "สำคัญพอกัน"], trait: 'mindset' },
            { type: 'phil', lvl: 'Easy', w: 2, text: "เมื่อเห็นคนทำความผิดเล็กน้อยแต่ไม่ได้ทำให้ใครเดือดร้อน คุณจะ...?", opts: ["ตักเตือนตามกฎ", "ปล่อยผ่านไป", "ทำตามสถานการณ์", "เก็บมาคิดกังวล"], trait: 'compliance' },

            // MEDIUM (11 QUESTIONS)
            { type: 'logic', lvl: 'Medium', w: 3, text: "ถ้านาฬิกาบอกเวลา 15:15 น. เข็มสั้นกับเข็มยาวทำมุมกันกี่องศา? (โดยประมาณ)", opts: ["0°", "7.5°", "15°", "22.5°"], ans: 1 },
            { type: 'math', lvl: 'Medium', w: 3, text: "ตัวเลขที่หายไป: 1, 4, 9, 16, 25, ...", opts: ["30", "36", "42", "49"], ans: 1 },
            { type: 'logic', lvl: 'Medium', w: 3, text: "ถ้านก 3 ตัว จับหนอน 3 ตัว ได้ใน 3 นาที นก 100 ตัว จะจับหนอน 100 ตัว ได้ในกี่นาที?", opts: ["1 นาที", "3 นาที", "33 นาที", "100 นาที"], ans: 1 },
            { type: 'visual', lvl: 'Medium', w: 3, content: svgAssets.wrap(svgAssets.box("1A") + svgAssets.box("2B") + svgAssets.box("3C") + svgAssets.box("4D") + svgAssets.box("5E") + svgAssets.box("6F") + svgAssets.box("7G") + svgAssets.box("8H") + svgAssets.q()), opts: ["9I", "9J", "10I", "10J"], ans: 0 },
            { type: 'math', lvl: 'Medium', w: 3, text: "พ่อมีอายุเป็น 3 เท่าของลูก อีก 10 ปีข้างหน้า พ่อจะมีอายุเป็น 2 เท่าของลูก ปัจจุบันลูกอายุกี่ปี?", opts: ["5", "10", "15", "20"], ans: 1 },
            { type: 'logic', lvl: 'Medium', w: 3, text: "สมชายรวยกว่าสมหญิง สมหญิงรวยกว่าสมบัตื สมควรจนกว่าสมหญิง ใครจนที่สุด?", opts: ["สมหญิง", "สมบัติ", "สมควร", "สรุปไม่ได้"], ans: 3 },
            { type: 'math', lvl: 'Medium', w: 3, text: "ไม้เบสบอลและลูกบอลรวมกันราคา 110 บาท ไม้เบสบอลราคาแพงกว่าลูกบอล 100 บาท ลูกบอลราคากี่บาท?", opts: ["5 บาท", "10 บาท", "15 บาท", "20 บาท"], ans: 0 },
            { type: 'phil', lvl: 'Medium', w: 4, text: "ถ้าต้องเลือกช่วยคน 10 คนที่คนในสังคมเกลียด กับช่วยคนดี 1 คน คุณจะเลือก...?", opts: ["ช่วย 10 คน (ประโยชน์นิยม)", "ช่วย 1 คน (คุณธรรมนิยม)", "ไม่เลือก", "ช่วยคนที่อยู่ใกล้สุด"], trait: 'utilitarian' },
            { type: 'phil', lvl: 'Medium', w: 4, text: "คุณคิดว่าความหมายของชีวิตคืออะไร?", opts: ["ความสำเร็จ", "ความสุข", "การเรียนรู้", "ความว่างเปล่า"], trait: 'existential' },
            { type: 'phil', lvl: 'Medium', w: 4, text: "หาก AI มีความรู้สึกเหมือนมนุษย์ เราควรให้สิทธิพลเมืองแก่ AI หรือไม่?", opts: ["ควร", "ไม่ควร", "ควรบางส่วน", "เป็นไปไม่ได้"], trait: 'future' },
            { type: 'phil', lvl: 'Medium', w: 4, text: "โลกที่ไม่มีสงครามแต่ไร้เสรีภาพ กับโลกที่มีสงครามแต่มีเสรีภาพ คุณเลือกอะไร?", opts: ["โลกสงบสุข", "โลกเสรี", "ยอมรับทั้งสอง", "ไม่เลือกทั้งคู่"], trait: 'liberty' },

            // HARD (12 QUESTIONS)
            { type: 'math', lvl: 'Hard', w: 5, text: "เลขชุดนี้คืออะไร: 2, 3, 5, 7, 11, 13, ...", opts: ["15", "17", "19", "21"], ans: 1 },
            { type: 'logic', lvl: 'Hard', w: 5, text: "ปลาทุกตัวว่ายน้ำได้ สิ่งที่ว่ายน้ำได้คือสัตว์น้ำ สรุปได้ว่าปลาคือสัตว์น้ำหรือไม่?", opts: ["ใช่ แน่นอน", "ไม่ใช่", "อาจจะใช่", "สรุปไม่ได้จากข้อมูล"], ans: 0 },
            { type: 'math', lvl: 'Hard', w: 5, text: "ถ้า x + y = 10 และ x^2 - y^2 = 20 แล้ว x - y เท่ากับเท่าใด?", opts: ["1", "2", "3", "4"], ans: 1 },
            { type: 'visual', lvl: 'Hard', w: 5, content: "🧩 รูปแบบซ้อนทับ: สี่เหลี่ยมหมุน 45 องศาทุกขั้นตอน และสีเปลี่ยนจากเข้มไปอ่อน... ขั้นตอนที่ 9 คืออะไร?", opts: ["สี่เหลี่ยมขาวตั้งตรง", "สี่เหลี่ยมขาวเอียง", "สี่เหลี่ยมดำตั้งตรง", "สี่เหลี่ยมดำเอียง"], ans: 1 },
            { type: 'logic', lvl: 'Hard', w: 5, text: "ในเกาะที่มีแต่คนโกหกกับคนพูดจริง นาย A บอกว่า 'นาย B เป็นคนพูดจริง' แต่นาย B บอกว่า 'เราทั้งคู่เป็นคนโกหก' ใครคือคนพูดจริง?", opts: ["นาย A", "นาย B", "ทั้งคู่โกหก", "ไม่มีคนพูดจริง"], ans: 3 },
            { type: 'math', lvl: 'Hard', w: 5, text: "มีลูกเต๋า 2 ลูก ทอยพร้อมกัน โอกาสที่จะได้แต้มรวมกันเท่ากับ 7 คือเท่าใด?", opts: ["1/6", "1/12", "1/36", "7/36"], ans: 0 },
            { type: 'logic', lvl: 'Hard', w: 5, text: "ถ้า 'มังกรทั้งหมดพ่นไฟได้' และ 'สิ่งที่พ่นไฟได้มีปีก' สรุปได้ว่ามังกรมีปีกหรือไม่?", opts: ["มีปีกแน่นอน", "อาจไม่มีปีก", "ไม่มีปีก", "ข้อมูลไม่พอ"], ans: 0 },
            { type: 'math', lvl: 'Hard', w: 5, text: "พื้นที่ของวงกลมที่ล้อมรอบสี่เหลี่ยมจัตุรัสที่มีด้านยาว 2 หน่วย คือเท่าใด?", opts: ["2π", "4π", "π", "8π"], ans: 0 },
            { type: 'phil', lvl: 'Hard', w: 6, text: "ถ้าความสุขของคนส่วนใหญ่ แลกมาด้วยความทรมานของเด็กเพียงคนเดียว คุณยอมรับระบบนี้ไหม?", opts: ["ไม่ยอมรับ (สิทธิมนุษยชน)", "ยอมรับถ้าคุ้มค่า", "พยายามหาทางอื่น", "เฉยๆ"], trait: 'omelas' },
            { type: 'phil', lvl: 'Hard', w: 6, text: "คุณจะเลือกมีชีวิตที่เป็นอมตะแต่ต้องเห็นคนที่รักจากไป หรือมีชีวิตสั้นๆ แต่มีความสุข?", opts: ["อมตะ", "ชีวิตสั้น", "ไม่มีอันไหนดี", "ตามโชคชะตา"], trait: 'mortality' },
            { type: 'phil', lvl: 'Hard', w: 6, text: "หากคุณสามารถลบความทรงจำที่เจ็บปวดได้ทั้งหมด คุณจะลบหรือไม่?", opts: ["ลบเพื่อเริ่มใหม่", "ไม่ลบ (มันคือบทเรียน)", "ลบบางส่วน", "ไม่แน่ใจ"], trait: 'experience' },
            { type: 'phil', lvl: 'Hard', w: 6, text: "ความจริงใจที่ทำร้ายความรู้สึก กับการโกหกที่ทำให้คนสบายใจ อะไรดีกว่ากัน?", opts: ["ความจริงใจ", "โกหกสีขาว", "นิ่งเฉย", "แล้วแต่คน"], trait: 'integrity' }
        ];

        // --- 🕹 Game logic ---
        let cur = 0;
        let answers = new Array(30).fill(null);
        let time = 30 * 60;
        let timerInt;

        function initGame() {
            if(!document.getElementById('p-name').value) return alert("โปรดใส่ชื่อของคุณ");
            document.getElementById('page-start').classList.remove('active');
            document.getElementById('page-test').classList.add('active');
            document.getElementById('timer-ui').classList.remove('hidden');
            startTimer();
            renderQ();
        }

        function startTimer() {
            timerInt = setInterval(() => {
                time--;
                let m = Math.floor(time / 60), s = time % 60;
                document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(time <= 0) finishGame();
            }, 1000);
        }

        function renderQ() {
            const q = questions[cur];
            document.getElementById('q-num').innerText = cur + 1;
            document.getElementById('q-lvl').innerText = `Level: ${q.lvl}`;
            document.getElementById('q-lvl').className = `inline-block px-3 py-1 rounded-md text-[10px] font-bold uppercase mb-2 ${q.lvl==='Easy'?'bg-emerald-500/20 text-emerald-400':q.lvl==='Medium'?'bg-amber-500/20 text-amber-400':'bg-rose-500/20 text-rose-400'}`;
            document.getElementById('prog-bar').style.width = `${((cur + 1) / 30) * 100}%`;

            let html = '';
            if(q.type === 'visual') html = `<div class="mb-10 scale-125">${q.content}</div>`;
            else html = `<div class="text-2xl font-bold text-center mb-10 px-6 leading-relaxed text-slate-200">${q.text}</div>`;

            html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">`;
            q.opts.forEach((opt, i) => {
                const sel = answers[cur] === i ? 'selected' : '';
                html += `<div onclick="select(${i})" class="option-item ${sel} p-5 flex items-center gap-4">
                    <div class="w-8 h-8 rounded-full bg-slate-900 flex items-center justify-center text-[10px] font-bold text-indigo-400 border border-slate-700">${String.fromCharCode(65+i)}</div>
                    <div class="text-sm font-medium">${opt}</div>
                </div>`;
            });
            html += `</div>`;
            document.getElementById('q-area').innerHTML = html;

            document.getElementById('btn-prev').style.opacity = cur > 0 ? '1' : '0';
            if(cur === 29) {
                document.getElementById('btn-next').classList.add('hidden');
                document.getElementById('btn-submit').classList.remove('hidden');
            } else {
                document.getElementById('btn-next').classList.remove('hidden');
                document.getElementById('btn-submit').classList.add('hidden');
            }
            document.getElementById('btn-next').disabled = answers[cur] === null;
        }

        window.select = (i) => { answers[cur] = i; renderQ(); };
        window.moveQ = (d) => { cur += d; renderQ(); };

        function finishGame() {
            clearInterval(timerInt);
            let score = 0, totalW = 0, pChoices = [];
            questions.forEach((q, i) => {
                totalW += q.w;
                if(q.type !== 'phil' && answers[i] === q.ans) score += q.w;
                if(q.type === 'phil') pChoices.push(answers[i]);
            });

            // IQ Calc
            let iq = Math.round(85 + (score / (totalW - 22)) * 75); // Simplified weight
            iq = Math.min(160, Math.max(70, iq));

            // Result Analysis
            let trait = "The Architect";
            let apt = "Logical Reasoning";
            let desc = "คุณมีทักษะในการวิเคราะห์ความสัมพันธ์ของข้อมูลที่ซับซ้อนได้ดีเยี่ยม";

            if(pChoices[0] === 0) { trait = "Rational Idealist"; desc += " และคุณมักจะตัดสินใจโดยยึดหลักจริยธรรมที่ส่งผลดีต่อคนส่วนใหญ่."; }
            else { trait = "Independent Thinker"; desc += " และคุณเป็นคนที่มีความเป็นตัวของตัวเองสูง ยึดถือความจริงมากกว่าสิ่งอื่น."; }

            if(score > 30) apt = "Abstract Mastery";
            else if (score > 15) apt = "Systematic Thinking";
            else apt = "Practical Logic";

            document.getElementById('res-user').innerText = document.getElementById('p-name').value;
            document.getElementById('res-iq').innerText = iq;
            document.getElementById('res-trait').innerText = trait;
            document.getElementById('res-apt').innerText = apt;
            document.getElementById('res-desc').innerText = desc;

            document.getElementById('page-test').classList.remove('active');
            document.getElementById('page-result').classList.add('active');
            document.getElementById('timer-ui').classList.add('hidden');
        }
    </script>
</body>
</html>
